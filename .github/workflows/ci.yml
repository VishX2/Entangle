# Green-by-default: Prisma validate + build client + admin. Runs on push/PR.
# Full API integration tests are in ci-api-tests.yml (run manually from Actions).
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Server — install & Prisma validate
        working-directory: server
        run: |
          npm ci
          npx prisma validate

      - name: Client — install & build
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Admin — install & build
        working-directory: admin
        run: |
          npm ci
          npm run build
