# Tests + builds on every push/PR. Does not deploy.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Server — install & Prisma validate
        working-directory: server
        run: |
          npm ci
          npx prisma validate

      - name: Client — install & build
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Admin — install & build
        working-directory: admin
        run: |
          npm ci
          npm run build

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: entangle_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d entangle_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/entangle_ci
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters-long
      ADMIN_EMAIL: admin@ci.local
      ADMIN_PASSWORD: Admin123!
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Server — schema, seed, test
        working-directory: server
        run: |
          npm ci
          npx prisma db push
          node seeds/seed.js
          npm test
