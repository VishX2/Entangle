# Deploy Entangle API to EC2: build on GitHub → SCP tarball → extract → npm ci → prisma generate → PM2 entangle.
#
# Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
# Optional: VITE_API_URL, EC2_DEPLOY_PATH
#
# Default install path: $HOME/Entangle on the SSH user (root → /root/Entangle, ec2-user → /home/ec2-user/Entangle).
# Override with secret EC2_DEPLOY_PATH only if you use a different directory.
#
# On the instance: server/.env must exist (not in git). Tarball excludes .env, uploads, node_modules.
#
name: Deploy EC2

# Manual only — avoids failed runs on every push when EC2 secrets are not configured.
on:
  workflow_dispatch:

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies & build frontends
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          export VITE_API_URL="${VITE_API_URL:-http://localhost:8000}"
          (cd server && npm ci)
          (cd client && npm ci && npm run build)
          (cd admin && npm ci && npm run build)

      - name: Prisma validate
        working-directory: server
        run: npx prisma validate

      - name: Create deploy bundle
        run: |
          mkdir -p bundle/server
          rsync -a --exclude node_modules --exclude uploads --exclude .env server/ bundle/server/
          rsync -a client/dist/ bundle/client-dist/
          rsync -a admin/dist/ bundle/admin-dist/
          cp deploy/ecosystem.config.cjs bundle/
          tar -czf deploy.tar.gz -C bundle .

      - name: Upload bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Extract, install API, PM2 reload
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:$PATH"
            # Root: /root/Entangle | ec2-user: /home/ec2-user/Entangle | or EC2_DEPLOY_PATH
            BASE="${DEPLOY_PATH:-$HOME/Entangle}"
            echo "Deploy path: $BASE user=$(whoami) node=$(command -v node || echo missing) npm=$(command -v npm || echo missing) pm2=$(command -v pm2 || echo missing)"
            command -v node >/dev/null || { echo "ERROR: node not found on server. Install Node 24."; exit 1; }
            command -v npm >/dev/null || { echo "ERROR: npm not found on server."; exit 1; }
            command -v pm2 >/dev/null || { echo "ERROR: pm2 not found. On EC2 run: npm install -g pm2"; exit 1; }
            mkdir -p "$BASE"
            tar -xzf /tmp/deploy.tar.gz -C "$BASE"
            rm -f /tmp/deploy.tar.gz
            cd "$BASE/server"
            npm ci --omit=dev
            npx prisma generate
            pm2 startOrReload "$BASE/ecosystem.config.cjs" --only entangle
            pm2 save
