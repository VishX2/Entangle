# Amplify build for client app (Entangle)
# If Amplify app root is "client": remove the "cd client" lines and use baseDirectory: dist
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd client
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
